# Local development services for StockPulse.
#
# Usage:
#   docker compose up -d            # Start PostgreSQL + Redis
#   docker compose down             # Stop services
#   docker compose logs -f pg       # Tail PostgreSQL logs
#   docker compose down -v          # Stop and remove volumes (resets data)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  pg:
    image: postgres:16-alpine
    container_name: stockpulse-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockpulse_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockpulse_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (BullMQ job queue + caching) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
