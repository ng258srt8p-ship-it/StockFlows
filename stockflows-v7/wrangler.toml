# StockFlows v7 — Cloudflare Pages Configuration
# Deploy with: wrangler pages deploy

name = "stockflows-website"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
  command = "pnpm --filter @stockflows/website build"
  directory = "packages/website/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.0"

[pages]
  build_cache_dir = ".wrangler/tmp/cache"

[[routes]]
  pattern = "stockflows.pages.dev"
  zone_name = "pages.dev"
