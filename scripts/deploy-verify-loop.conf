# StockFlows Deploy-Verification Loop Configuration
# ================================================
# 
# This file contains default configuration for the deploy-verify-loop.sh script.
# Source this file or set environment variables before running the script.
#
# To use: source scripts/deploy-verify-loop.conf && scripts/deploy-verify-loop.sh
# Or set variables in your shell profile / .env file

# GitHub Configuration
export GITHUB_USERNAME="georgetozer"
export GITHUB_EMAIL="georgetozer@gmail.com"
export GITHUB_REPO_NAME="stockflows"

# Fly.io Configuration
export FLY_APP_NAME="stockflows"
export FLY_REGION="iad"
export FLY_DATABASE_URL=""  # Set this for database migrations
export FLY_REDIS_HOST=""    # Optional Redis host

# Shopify Configuration
export SHOPIFY_API_KEY=""
export SHOPIFY_API_SECRET=""
export SHOPIFY_APP_URL="https://stockflows.app"

# Cloudflare Pages Configuration
export CLOUDFLARE_PAGES_PROJECT="stockflows-tour"
export CLOUDFLARE_PAGES_BRANCH="main"

# Deployment Loop Configuration
export DEPLOY_ITERATIONS="1"
export DEPLOY_STOP_ON_FAILURE="1"
export DEPLOY_FORCE_FAILURE_TEST="false"

# Health Check URLs (these should be set after first successful deployment)
export FLY_APP_URL="https://stockflows.fly.dev"
export CLOUDFLARE_PAGES_URL="https://stockflows.app"

# Optional: Slack/Discord webhook for notifications
export DEPLOY_NOTIFICATION_WEBHOOK=""

# Optional: Custom wait times (in seconds)
export DEPLOY_HEALTH_CHECK_WAIT="30"
export DEPLOY_ITERATION_DELAY="60"
export DEPLOY_MAX_HEALTH_RETRIES="10"

# ================================================
# USAGE EXAMPLES:
# ================================================
#
# Run with custom iterations:
#   ITERATIONS=3 ./scripts/deploy-verify-loop.sh
#
# Run continuing on failures:
#   ./scripts/deploy-verify-loop.sh --continue-on-failure
#
# Run with config file:
#   source scripts/deploy-verify-loop.conf && ./scripts/deploy-verify-loop.sh
#
# Run with environment file:
#   export $(cat .env.deploy | xargs) && ./scripts/deploy-verify-loop.sh 3
#
# Dry run (no actual deployments):
#   DRY_RUN=1 ./scripts/deploy-verify-loop.sh
#
# ================================================
# REQUIRED SECRETS (set in CI/CD or local environment):
# ================================================
#
# GitHub:
#   GITHUB_TOKEN (or gh auth login)
#
# Fly.io:
#   FLY_TOKEN (or fly auth login)
#   DATABASE_URL
#   REDIS_HOST (optional)
#
# Shopify:
#   SHOPIFY_API_KEY
#   SHOPIFY_API_SECRET
#
# Cloudflare:
#   CLOUDINARY_API_TOKEN (for wrangler auth)
#   Or run: npx wrangler login
#
# ================================================
# TROUBLESHOOTING:
# ================================================
#
# If deployments fail:
# 1. Check CLI authentication: gh auth status, fly auth token, npx wrangler whoami
# 2. Verify secrets are set: fly secrets list, gh secret list
# 3. Check logs: fly logs, gh run list
# 4. Test individual steps manually
#
# If E2E tests fail:
# 1. Run locally: npx playwright test --ui
# 2. Check test-results/ for screenshots and traces
# 3. Verify deployed URLs are accessible
#
# ================================================